            "@type": "Answer",
            "text": "Zen Notes is a minimalist, distraction-free markdown notes application designed for focused writing and quiet thinking."

          "@type": "Question",
          "name": "Does Zen Notes support Markdown?",

          }
        },
        {
          "@type": "Question",
          "name": "Is Zen Notes offline-first?",
          "acceptedAnswer": {
            "@type": "Answer",
